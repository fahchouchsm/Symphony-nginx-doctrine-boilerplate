version: "3.9"

services:
    php:
        build: ./docker/php
        container_name: symfony_php
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: symfony_nginx
        ports:
            - "8081:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    db:
        image: mysql:8.0
        container_name: symfony_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: ecom
            MYSQL_USER: simo
            MYSQL_PASSWORD: pass
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data:

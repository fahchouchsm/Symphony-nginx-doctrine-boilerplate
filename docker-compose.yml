services:
    php:
        build: ./docker/php
        container_name: symfony_php
        working_dir: /var/www/html
        environment:
            DATABASE_URL: "mysql://symfony:symfony@db:3306/symfony_db?serverVersion=8.0&charset=utf8mb4"
            APP_ENV: dev
            APP_DEBUG: 1
            APP_SECRET: "b3a4c2d1e5f6a7b8c9d0e1f2a3b4c5d6"
        volumes:
            - ./:/var/www/html
        depends_on:
            db:
                condition: service_healthy

    nginx:
        image: nginx:alpine
        container_name: symfony_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    db:
        image: mysql:8.0
        container_name: symfony_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: symfony_db
            MYSQL_USER: symfony
            MYSQL_PASSWORD: symfony
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    db_data:
